# Application Name & Port
spring.application.name=visitor-management
server.port=${PORT:8080}

# ---- MySQL Database Configuration ----
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/visitor_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

# ---- JPA / Hibernate Configuration ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- Jackson (Date/Time Serialization) ----
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=UTC
